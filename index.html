<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0f19">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Doc Scanner</title>
<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0b0f19; color: #e2e8f0;
  display: flex; flex-direction: column; overflow: hidden;
}
#app { flex: 1; display: flex; flex-direction: column; max-width: 600px; width: 100%; margin: 0 auto; }
header {
  padding: 1rem; text-align: center;
  background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
  border-bottom: 1px solid #1e293b; flex-shrink: 0;
}
header h1 { font-size: 1.2rem; color: #38bdf8; }
header p { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

main { flex: 1; overflow-y: auto; padding: 1rem; }

.config {
  background: #1e293b; border-radius: 12px;
  padding: 0.875rem; margin-bottom: 0.75rem; border: 1px solid #334155;
}
.config label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.config input {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
  font-size: 0.85rem; font-family: monospace;
}
.config .hint { font-size: 0.7rem; color: #64748b; margin-top: 6px; line-height: 1.4; }

.scanner {
  background: #1e293b; border-radius: 16px;
  border: 2px dashed #334155; overflow: hidden;
  position: relative; aspect-ratio: 3/4;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; margin-bottom: 0.75rem;
}
.scanner.active { border-color: #38bdf8; border-style: solid; }

#video { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }
#preview { width: 100%; height: 100%; object-fit: contain; display: none; background: #0f172a; }
.drop-zone {
  padding: 2rem; text-align: center; cursor: pointer;
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.7; }
.drop-zone p { color: #94a3b8; font-size: 0.9rem; }
.drop-zone .hint { color: #64748b; font-size: 0.75rem; margin-top: 6px; }
.drop-zone input { display: none; }

.controls {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0.6rem; margin-bottom: 0.75rem;
}
.btn {
  padding: 14px 4px; border: none; border-radius: 10px;
  font-size: 0.85rem; font-weight: 600; cursor: pointer;
  transition: all 0.15s; text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #38bdf8; color: #0f172a; }
.btn-accent { background: #22c55e; color: #fff; }
.btn-warn { background: #ef4444; color: #fff; }
.btn-secondary { background: #334155; color: #e2e8f0; }

.progress-box {
  background: #1e293b; border-radius: 12px;
  padding: 1rem; margin-bottom: 0.75rem;
  border: 1px solid #334155; display: none;
}
.progress-box.show { display: block; }
.progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; width: 0%; background: #38bdf8; border-radius: 3px; transition: width 0.3s; }
.progress-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.75rem; color: #94a3b8; }

.result {
  background: #1e293b; border-radius: 12px;
  padding: 1rem; border: 1px solid #334155;
  margin-bottom: 0.75rem; display: none;
}
.result.show { display: block; }
.result h3 { font-size: 0.8rem; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.result pre {
  background: #0f172a; padding: 10px; border-radius: 8px;
  font-size: 0.8rem; color: #94a3b8; overflow-x: auto;
  white-space: pre-wrap; word-break: break-word;
  max-height: 180px; overflow-y: auto; line-height: 1.5;
}

.status {
  padding: 12px; border-radius: 10px;
  font-size: 0.85rem; text-align: center;
  margin-bottom: 0.75rem; display: none;
}
.status.success { background: #064e3b; color: #6ee7b7; display: block; }
.status.error { background: #450a0a; color: #fca5a5; display: block; }
.status.loading { background: #1e3a5f; color: #93c5fd; display: block; }

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin 1s linear infinite;
  margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

#canvas, #procCanvas { display: none; }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>📄 Doc Scanner v2.0</h1>
    <p>OCR → Google Sheets</p>
  </header>

  <main>
    <div class="config">
      <label>Google Apps Script URL</label>
      <input type="text" id="scriptUrl" placeholder="Paste your deployed Apps Script URL">
      <div class="hint">Paste the URL from your Google Apps Script deployment.</div>
    </div>

    <div class="scanner" id="scanner">
      <video id="video" autoplay playsinline></video>
      <img id="preview" alt="Preview">
      <div class="drop-zone" id="dropZone">
        <div class="icon">📁</div>
        <p>Tap to choose image</p>
        <div class="hint">or use camera below</div>
        <input type="file" id="fileInput" accept="image/*">
      </div>
    </div>

    <canvas id="canvas"></canvas>
    <canvas id="procCanvas"></canvas>

    <div class="controls" id="controls">
      <button class="btn btn-primary" id="btnCamera" onclick="startCamera()" style="grid-column: 1 / -1;">📷 Open Camera</button>
      <button class="btn btn-primary" id="btnCapture" onclick="capture()" style="display:none; grid-column: 1 / -1;">⚡ Capture</button>
      <button class="btn btn-secondary" id="btnRetake" onclick="retake()" style="display:none;">🔄 Retake</button>
      <button class="btn btn-secondary" id="btnGallery" onclick="document.getElementById('fileInput').click()">🖼 Gallery</button>
      <button class="btn btn-warn" id="btnRotate" onclick="rotateImage()" style="display:none;">↻ Rotate</button>
      <button class="btn btn-accent" id="btnScan" onclick="runOCR()" style="display:none;">🔍 Scan Text</button>
    </div>

    <div class="progress-box" id="progressBox">
      <div style="font-weight:600; font-size:0.9rem;">Reading document...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-meta">
        <span id="progressText">Initializing...</span>
        <span id="progressPct">0%</span>
      </div>
    </div>

    <div class="result" id="result">
      <h3>Extracted Text</h3>
      <pre id="extractedText"></pre>
    </div>

    <div class="status" id="status"></div>
  </main>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(err => alert('SW error: ' + err));
}

const video = document.getElementById('video');
const preview = document.getElementById('preview');
const canvas = document.getElementById('canvas');
const procCanvas = document.getElementById('procCanvas');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const scanner = document.getElementById('scanner');
const progressBox = document.getElementById('progressBox');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const progressPct = document.getElementById('progressPct');
const result = document.getElementById('result');
const extractedText = document.getElementById('extractedText');
const status = document.getElementById('status');

let stream = null, rotation = 0;

function toggle(id, show) {
  const el = document.getElementById(id);
  if (el) el.style.display = show ? 'flex' : 'none';
}

function showStatus(msg, type) {
  status.innerHTML = msg;
  status.className = 'status ' + type;
  status.style.display = 'block';
}

function hideStatus() {
  status.className = 'status';
  status.style.display = 'none';
}

// ── Camera ──
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 } } });
    video.srcObject = stream;
    video.style.display = 'block';
    dropZone.style.display = 'none';
    preview.style.display = 'none';
    toggle('btnCamera', false);
    toggle('btnGallery', false);
    toggle('btnCapture', true);
    scanner.classList.add('active');
  } catch (err) {
    alert('Camera failed: ' + err.message);
    showStatus('❌ Camera blocked. Use Gallery.', 'error');
  }
}

function capture() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  stopCamera();
  showImage();
  toggle('btnScan', true);
  toggle('btnRotate', true);
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  video.style.display = 'none';
  toggle('btnCapture', false);
  toggle('btnRetake', true);
  scanner.classList.remove('active');
}

// ── Gallery ──
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    showStatus('Please select an image', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      rotation = 0;
      showImage();
      toggle('btnCamera', false);
      toggle('btnGallery', false);
      toggle('btnRetake', true);
      toggle('btnScan', true);
      toggle('btnRotate', true);
    };
    img.onerror = () => alert('Failed to load image');
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function showImage() {
  preview.src = canvas.toDataURL('image/jpeg', 0.92);
  preview.style.display = 'block';
  dropZone.style.display = 'none';
}

function rotateImage() {
  rotation = (rotation + 90) % 360;
  const w = canvas.width;
  const h = canvas.height;
  procCanvas.width = (rotation % 180 === 0) ? w : h;
  procCanvas.height = (rotation % 180 === 0) ? h : w;
  const ctx = procCanvas.getContext('2d');
  ctx.translate(procCanvas.width / 2, procCanvas.height / 2);
  ctx.rotate(rotation * Math.PI / 180);
  ctx.drawImage(canvas, -w / 2, -h / 2);
  // Copy back to main canvas
  canvas.width = procCanvas.width;
  canvas.height = procCanvas.height;
  canvas.getContext('2d').drawImage(procCanvas, 0, 0);
  preview.src = canvas.toDataURL('image/jpeg', 0.92);
}

function retake() {
  preview.style.display = 'none';
  result.classList.remove('show');
  dropZone.style.display = 'flex';
  toggle('btnCamera', true);
  toggle('btnGallery', true);
  toggle('btnRetake', false);
  toggle('btnScan', false);
  toggle('btnRotate', false);
  hideStatus();
  progressBox.classList.remove('show');
  rotation = 0;
}

// ── Preprocessing ──
function preprocess() {
  const w = canvas.width;
  const h = canvas.height;
  procCanvas.width = w;
  procCanvas.height = h;
  const src = canvas.getContext('2d').getImageData(0, 0, w, h);
  const dst = procCanvas.getContext('2d').createImageData(w, h);
  const data = src.data;
  const out = dst.data;
  for (let i = 0; i < data.length; i += 4) {
    const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    const contrast = (gray - 128) * 1.5 + 128;
    const val = contrast < 0 ? 0 : contrast > 255 ? 255 : contrast;
    out[i] = out[i + 1] = out[i + 2] = val;
    out[i + 3] = 255;
  }
  procCanvas.getContext('2d').putImageData(dst, 0, 0);
  return procCanvas;
}

// ── OCR ──
async function runOCR() {
  const scriptUrl = document.getElementById('scriptUrl').value.trim();
  if (!scriptUrl) {
    alert('Please paste your Google Apps Script URL first');
    return;
  }

  progressBox.classList.add('show');
  toggle('btnRetake', false);
  toggle('btnRotate', false);
  toggle('btnScan', false);
  hideStatus();

  try {
    const processed = preprocess();

    const { data: { text } } = await Tesseract.recognize(
      processed,
      'eng',
      {
        logger: m => {
          if (m.status === 'recognizing text') {
            const p = Math.round(m.progress * 100);
            progressFill.style.width = p + '%';
            progressPct.textContent = p + '%';
            progressText.textContent = 'Reading text...';
          } else {
            progressText.textContent = m.status;
          }
        }
      }
    );

    progressBox.classList.remove('show');
    extractedText.textContent = text;
    result.classList.add('show');

    if (text.trim().length < 5) {
      showStatus('⚠️ Very little text found. Try rotating the image.', 'error');
      toggle('btnRetake', true);
      toggle('btnRotate', true);
      toggle('btnScan', true);
      return;
    }

    // Save
    showStatus('<span class="spinner"></span>Saving...', 'loading');
    const params = new URLSearchParams();
    params.append('text', text);
    params.append('date', new Date().toLocaleString());

    const res = await fetch(scriptUrl, { method: 'POST', body: params });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Save failed');

    showStatus('✅ Saved to Google Sheets!', 'success');
  } catch (err) {
    progressBox.classList.remove('show');
    alert('Error: ' + err.message);
    showStatus('❌ ' + err.message, 'error');
    toggle('btnRetake', true);
    toggle('btnRotate', true);
    toggle('btnScan', true);
  }
}
</script>

</body>
</html>
